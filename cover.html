<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #0f0f0f;
    font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    display: flex;
  }

  /* ── Left panel ── */
  .left {
    width: 860px;
    height: 1080px;
    padding: 72px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    overflow: hidden;
  }

  /* decorative ring */
  .left::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    border: 80px solid rgba(245,166,35,0.06);
    bottom: -160px; left: -160px;
    pointer-events: none;
  }
  .left::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    border-radius: 50%;
    border: 40px solid rgba(245,166,35,0.04);
    top: -60px; right: -60px;
    pointer-events: none;
  }

  /* left accent bar */
  .accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
    background: linear-gradient(180deg, #f5a623 0%, #e8941a 100%);
  }

  /* header */
  .header { position: relative; z-index: 1; }
  .badge {
    display: inline-block;
    background: rgba(245,166,35,0.15);
    border: 1px solid rgba(245,166,35,0.4);
    border-radius: 20px;
    padding: 6px 18px;
    font-size: 15px;
    color: #f5a623;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }
  .title-main {
    font-size: 80px;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -2px;
  }
  .title-main span { color: #f5a623; }
  .subtitle {
    font-size: 22px;
    color: #888;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  /* countdown card */
  .countdown-card {
    background: linear-gradient(135deg, #f5a623, #d4880e);
    border-radius: 20px;
    padding: 36px 40px;
    position: relative;
    z-index: 1;
  }
  .countdown-label {
    font-size: 16px;
    color: rgba(0,0,0,0.5);
    font-weight: 600;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }
  .countdown-nums {
    display: flex;
    align-items: baseline;
    gap: 0;
  }
  .num-block { text-align: center; margin-right: 40px; }
  .num {
    font-size: 100px;
    font-weight: 900;
    color: #000;
    line-height: 1;
    letter-spacing: -4px;
  }
  .unit {
    font-size: 18px;
    color: rgba(0,0,0,0.5);
    font-weight: 600;
    margin-top: 4px;
  }
  .race-info {
    margin-top: 20px;
    font-size: 18px;
    color: rgba(0,0,0,0.55);
    font-weight: 600;
  }
  .race-info span { font-size: 20px; margin-right: 4px; }

  /* phase bar */
  .phases {
    display: flex;
    gap: 12px;
    position: relative;
    z-index: 1;
  }
  .phase {
    flex: 1;
    border-radius: 12px;
    padding: 14px 16px;
    text-align: center;
  }
  .phase.active { opacity: 1; }
  .phase.dim { opacity: 0.3; }
  .phase-name { font-size: 17px; font-weight: 700; }
  .phase-sub { font-size: 13px; margin-top: 4px; }
  .p1 { background: #1e3a5f; }
  .p1 .phase-name, .p1 .phase-sub { color: #5ab4ff; }
  .p2 { background: #3a1e5f; }
  .p2 .phase-name, .p2 .phase-sub { color: #c97aff; }
  .p3 { background: #5f3a1e; }
  .p3 .phase-name, .p3 .phase-sub { color: #ffa05a; }
  .p4 { background: #1e5f3a; }
  .p4 .phase-name, .p4 .phase-sub { color: #5aff9a; }

  /* targets */
  .targets { position: relative; z-index: 1; }
  .targets-title {
    font-size: 16px;
    color: #666;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .target-row {
    display: flex;
    gap: 12px;
  }
  .target-item {
    flex: 1;
    background: #1a1a1a;
    border-radius: 12px;
    padding: 14px 16px;
    border-left: 3px solid #f5a623;
  }
  .target-key { font-size: 13px; color: #666; margin-bottom: 4px; }
  .target-val { font-size: 20px; font-weight: 700; color: #f5a623; }

  /* footer */
  .footer {
    font-size: 14px;
    color: #444;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }

  /* ── Divider ── */
  .divider {
    width: 2px;
    background: linear-gradient(180deg, transparent, rgba(245,166,35,0.3) 30%, rgba(245,166,35,0.3) 70%, transparent);
  }

  /* ── Right panel ── */
  .right {
    flex: 1;
    height: 1080px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    position: relative;
    overflow: hidden;
  }

  /* grid bg */
  .right::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .phone-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 40px;
  }

  .phone-frame {
    width: 400px;
    border-radius: 36px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px rgba(245,166,35,0.3),
      0 40px 120px rgba(0,0,0,0.8),
      0 0 80px rgba(245,166,35,0.1);
    position: relative;
  }

  .phone-frame img {
    width: 100%;
    display: block;
  }

  /* glow behind phone */
  .phone-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,166,35,0.12) 0%, transparent 70%);
    z-index: 0;
  }

  /* corner tag */
  .corner-tag {
    position: absolute;
    bottom: 40px;
    right: 40px;
    background: rgba(245,166,35,0.12);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 14px;
    color: #f5a623;
    letter-spacing: 1px;
    z-index: 2;
  }
</style>
</head>
<body>

<!-- LEFT -->
<div class="left">
  <div class="accent-bar"></div>

  <!-- Header -->
  <div class="header">
    <div class="badge">🏋️ HYROX · 男子大众组</div>
    <div class="title-main">备战<span>指南</span></div>
    <div class="subtitle">大门 · 上海站 · 2026.10.31</div>
  </div>

  <!-- Countdown -->
  <div class="countdown-card">
    <div class="countdown-label">📍 距离比赛</div>
    <div class="countdown-nums">
      <div class="num-block">
        <div class="num">155</div>
        <div class="unit">天</div>
      </div>
      <div class="num-block">
        <div class="num">17</div>
        <div class="unit">时</div>
      </div>
      <div class="num-block">
        <div class="num">36</div>
        <div class="unit">分</div>
      </div>
    </div>
    <div class="race-info"><span>📅</span>2026年10月31日 · 上海站</div>
  </div>

  <!-- Phase -->
  <div class="phases">
    <div class="phase p1 active">
      <div class="phase-name">基础期</div>
      <div class="phase-sub">5-6月</div>
    </div>
    <div class="phase p2 dim">
      <div class="phase-name">力量期</div>
      <div class="phase-sub">7-8月</div>
    </div>
    <div class="phase p3 dim">
      <div class="phase-name">专项期</div>
      <div class="phase-sub">9-10月</div>
    </div>
    <div class="phase p4 dim">
      <div class="phase-name">赛前</div>
      <div class="phase-sub">10月末</div>
    </div>
  </div>

  <!-- Targets -->
  <div class="targets">
    <div class="targets-title">🎯 赛前目标</div>
    <div class="target-row">
      <div class="target-item">
        <div class="target-key">完赛时间</div>
        <div class="target-val">90-100 min</div>
      </div>
      <div class="target-item">
        <div class="target-key">跑步配速</div>
        <div class="target-val">5:30-6:00/km</div>
      </div>
      <div class="target-item">
        <div class="target-key">赛前体重</div>
        <div class="target-val">78-79 kg</div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">🦞 小门制作 · zhudamen528-code.github.io/hyrox-training</div>
</div>

<!-- Divider -->
<div class="divider"></div>

<!-- RIGHT -->
<div class="right">
  <div class="phone-glow"></div>
  <div class="phone-wrap">
    <div class="phone-frame">
      <img src="https://qa-cos-1251524319.cos.ap-shanghai.myqcloud.com/yunxiao/lobi/prod/images/e1675f14f5161bbf653ee6bf57ffaa60.png" alt="HYROX备战指南截图" />
    </div>
  </div>
  <div class="corner-tag">📱 手机端优先设计</div>
</div>

</body>
</html>
